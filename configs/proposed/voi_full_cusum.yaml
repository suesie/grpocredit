extends: ../base_qwen_math.yaml

# voi_full + CUSUM auxiliary signal stacked via rank correlation.
# Only trained if the sprint's offline gate confirms
#   ρ(|δ_t|, Var(Q^π)) > ρ(H_token, Var(Q^π)).

name: voi_full_cusum
advantage:
  mode: voi
cascade:
  stage0:
    enabled: true
  stage1:
    enabled: true
  stage2:
    enabled: true
    gate_mode: binary
    n_lookaheads: 4
  cusum:
    enabled: true
    window_size: 15
    keep_top_pct: 0.2
wandb:
  tags: [main, proposed, voi_full_cusum]
  job_type: train
